<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Pro</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="toolbar" role="toolbar" aria-label="Editor toolbar"></div>
      <div id="workspace">
        <div id="editor-pane"></div>
        <div id="divider" role="separator" tabindex="0" aria-label="Resize editor and preview panes" aria-orientation="vertical" aria-valuemin="20" aria-valuemax="80" aria-valuenow="50"></div>
        <div id="preview-pane" aria-live="polite" aria-label="Rendered preview">
          <div id="preview-content" class="preview-content"></div>
        </div>
      </div>
      <div id="statusbar" role="status" aria-live="polite"></div>
    </div>
  </body>
</html>
